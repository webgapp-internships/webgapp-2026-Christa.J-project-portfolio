<!DOCTYPE html>
<html>
    <head><title>image display</title></head>
    <style>
        .i1{
            position:fixed;
            top:0px;
            width:150px;
            height:150px;
            background-image:url("ii1.webp");
        }
        .i2{
            position:fixed;
            top: 600px;
            width:150px;
            height:150px;
            background-image:url("ii1.webp");
        }
        .i3{
            position:fixed;
            top:0px;
            left:1400px;
            width:150px;
            height:150px;
            background-image:url("ii1.webp");
        }
        .i4{
            position:fixed;
            top:600px;
            left:1400px;
            width:150px;
            height:150px;
            background-image:url("ii1.webp");
        }
        .i5{
            position:relative;
            top:300px;
            left:700px;
            width:150px;
            height:150px;
            background-image:url("ii1.webp");

        }
        .text{
            position:absolute;
            top:27px;
            left:30px;
            font-family:Arial, Helvetica, sans-serif;
            color: black;
            font-size:xx-large;
        }
        .i6{
            position:fixed;
            top:400px;
            left:250px;
            width:150px;
            height:150px;
            background-image:url("ii1.webp");
        }
    </style>
    <body>
        <div class="i1"><div class="text"><p>hello</p></div></div>
        <div class="i2"><div class="text"><p>hello</p></div></div>
        <div class="i3"><div class="text"><p>hello</p></div></div>
        <div class="i4"><div class="text"><p>hello</p></div></div>
        <div class="i5"><div class="text"><p>hello</p></div></div>
        <div class="i6"><div class="text"><p>hello</p></div></div>
        
    </body>
</html>
